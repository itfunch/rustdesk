name: Full Flutter CI MODIFIED

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
    - "docs/**"
    - "README.md"
  push:
    branches:
    - master
    paths-ignore:
    - ".github/**"
    - "docs/**"
    - "README.md"
    - "res/**"
    - "appimage/**"
    - "flatpak/**"

jobs:
  run-ci:
    uses: ./.github/workflows/flutter-build-modified-release.yml
    with:
      upload-artifact: true
    secrets: inherit
